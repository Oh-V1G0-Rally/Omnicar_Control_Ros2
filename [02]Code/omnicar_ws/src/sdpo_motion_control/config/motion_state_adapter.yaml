/**:
  ros__parameters:
    # Select which upstream topic feeds the unified motion state.
    input_type: pose
    # Raw odometry input used when input_type is odom.
    odom_topic: odom
    # Corrected pose input used when input_type is pose.
    pose_topic: pose
    # Unified state topic consumed by controllers in this package.
    state_topic: motion_state
    # Body frame id to publish when the upstream source does not provide one.
    body_frame_id: base_footprint
    # Optional fallback for empty upstream frame ids.
    default_state_frame_id: ""
    # When the source is pose-only, publish explicit zero velocities and mark them unavailable.
    publish_zero_velocity_for_pose: true
